<div class="age-verification">
  <div class="age-verification__modal">
    <h2 class="age-verification__title">{{ texts().adultWarning.title }}</h2>

    <p class="age-verification__message">
      {{ texts().adultWarning.description2 }}<br>
      {{ texts().adultWarning.question }}
    </p>

    <div class="age-verification__buttons">
      <button
        class="age-verification__btn age-verification__btn--adult"
        type="button"
        (click)="onAdult()"
      >
        {{ texts().adultWarning.accept }}
      </button>

      <button
        class="age-verification__btn age-verification__btn--minor"
        type="button"
        (click)="onUnderage()"
      >
        {{ texts().adultWarning.cancel }}
      </button>
    </div>
  </div>
</div>
