@if (currentImage) {
  <div
    class="slideshow"
    [class.ui-hidden]="slideshowState.uiHidden"
    [class.manual-hidden]="slideshowState.manualHidden"
  >
    <div class="slideshow__container">
      <div class="slideshow__header">
        <div class="slideshow__counter">
          <span>{{ currentIndex }}</span> / <span>{{ totalImages }}</span>
        </div>
        <button class="slideshow__close" (click)="close()" title="閉じる">&times;</button>
      </div>

      <button class="slideshow__toggle-ui" (click)="toggleUI()" [title]="slideshowState.uiHidden ? 'UI表示' : 'UI非表示'">
        @if (!slideshowState.uiHidden) {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        }
        @if (slideshowState.uiHidden) {
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        }
      </button>

      <div
        class="slideshow__image-wrapper"
        (click)="!slideshowState.zoomed && toggleZoom()"
      >
        <img
          class="slideshow__image"
          [class.zoomed]="slideshowState.zoomed"
          [src]="currentImage.fullSize"
          [alt]="currentImage.title"
          draggable="false"
          [style.transform]="slideshowState.zoomed ? 'translate(' + slideshowState.pan.currentX + 'px, ' + slideshowState.pan.currentY + 'px) scale(2.5)' : 'none'"
          [style.cursor]="slideshowState.zoomed ? (slideshowState.pan.isDragging ? 'grabbing' : 'grab') : 'default'"
          (mousedown)="onPanStart($event)"
          (mousemove)="onPanMove($event)"
          (mouseup)="onPanEnd($event)"
          (mouseleave)="onPanEnd($event)"
          (touchstart)="onPanStart($event)"
          (touchmove)="onPanMove($event)"
          (touchend)="onPanEnd($event)"
          (touchcancel)="onPanEnd($event)"
        >
      </div>

      <button
        class="slideshow__nav slideshow__nav--prev"
        [class.hidden]="slideshowState.index === 0"
        (click)="prev()"
        title="前へ"
      >
        &#10094;
      </button>

      <button
        class="slideshow__nav slideshow__nav--next"
        [class.hidden]="slideshowState.index === totalImages - 1"
        (click)="next()"
        title="次へ"
      >
        &#10095;
      </button>

      <div class="slideshow__footer">
        <div class="slideshow__info">
          <h3 class="slideshow__title">{{ currentImage.title }}</h3>
          <p class="slideshow__description">{{ currentImage.description }}</p>
        </div>
        <div class="slideshow__controls">
          <button class="slideshow__btn slideshow__zoom-toggle" (click)="toggleZoom()" [title]="slideshowState.zoomed ? '縮小' : '拡大'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              @if (!slideshowState.zoomed) {
                <line x1="11" y1="8" x2="11" y2="14"></line>
                <line x1="8" y1="11" x2="14" y2="11"></line>
              }
              @if (slideshowState.zoomed) {
                <line x1="8" y1="11" x2="14" y2="11"></line>
              }
            </svg>
            {{ slideshowState.zoomed ? '縮小' : '拡大' }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
