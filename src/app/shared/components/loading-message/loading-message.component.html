<div class="loading-message" role="status" aria-live="polite">
  <app-loading-spinner [label]="displaySpinnerLabel()" />

  <div class="loading-message__copy-stack">
    <div class="loading-message__copy loading-message__copy--initial">
      <strong>{{ displayTitle() }}</strong>
      @if (description()) {
        <span>{{ description() }}</span>
      }
    </div>

    <div class="loading-message__copy loading-message__copy--slow">
      <strong>{{ displaySlowTitle() }}</strong>
      <span>{{ displaySlowDescription() }}</span>
    </div>

    <div class="loading-message__copy loading-message__copy--very-slow">
      <strong>{{ displayVerySlowTitle() }}</strong>
      <span>{{ displayVerySlowDescription() }}</span>
    </div>
  </div>
</div>
