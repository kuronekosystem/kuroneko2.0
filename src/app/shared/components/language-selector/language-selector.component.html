<label class="language-selector">
  <span>{{ texts().languageSelector.label }}</span>
  <select [attr.aria-label]="texts().languageSelector.ariaLabel" [ngModel]="language()" (ngModelChange)="changeLanguage($event)">
    @for (option of options; track option.code) {
      <option [ngValue]="option.code">{{ option.nativeLabel }}</option>
    }
  </select>
</label>
